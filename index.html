<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <p class="eyebrow">Suivi simple</p>
        <h1>Task Tracker</h1>
      </header>

      <form class="task-form" id="task-form">
        <label for="task-input">Nouvelle tâche</label>
        <p class="form-help" id="task-help">Saisissez une tâche puis appuyez sur Entrée ou sur Ajouter.</p>
        <div class="task-entry">
          <input
            id="task-input"
            name="task"
            type="text"
            placeholder="Ex. Préparer le cours"
            autocomplete="off"
            aria-describedby="task-help"
            required
          >
          <button type="submit" aria-label="Ajouter la tâche saisie">Ajouter</button>
        </div>
        <p class="storage-error hidden" id="storage-error" role="alert">
          La sauvegarde locale est indisponible. Les changements peuvent être perdus au rechargement.
        </p>
      </form>

      <section class="task-panel" aria-labelledby="tasks-title">
        <div class="panel-header">
          <h2 id="tasks-title">Mes tâches</h2>
          <span id="task-count" aria-live="polite">0 tâche</span>
        </div>
        <div class="task-filters" role="group" aria-label="Filtrer les tâches">
          <button type="button" class="filter-button" data-filter="all" aria-pressed="true">Toutes</button>
          <button type="button" class="filter-button" data-filter="active" aria-pressed="false">Actives</button>
          <button type="button" class="filter-button" data-filter="completed" aria-pressed="false">Terminées</button>
        </div>
        <ul class="task-list" id="task-list" aria-describedby="task-count"></ul>
        <p class="empty-message" id="empty-message">Aucune tâche pour le moment.</p>
      </section>

      <div class="task-actions">
        <button type="button" class="delete-all-button" id="delete-all-button">Tout supprimer</button>
      </div>
    </main>

    <script src="common.js"></script>
    <script src="app.js"></script>
  </body>
</html>
